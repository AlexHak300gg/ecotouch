name: ecotouch
description: "EcoTouch — приложение для экопривычек и управления вторсырьём."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  crypto: ^3.0.6
  image_picker: ^1.1.2
  image_cropper: ^11.0.0
  flutter_local_notifications: ^19.4.2
  intl: ^0.20.2
  timezone: ^0.10.1
  provider: ^6.1.2
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  email_validator: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true